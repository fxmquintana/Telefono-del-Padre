<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>El Teléfono del Padre</title>
<style>
  :root{
    --dorado:#185FA5;
    --dorado-claro:#378ADD;
    --crema:#F4ECDD;
    --marron:#0C2B45;
    --marron-suave:#3A587A;
    --sombra: rgba(6,25,44,0.3);
    --beige-texto:#E3D6BC;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Georgia', 'Times New Roman', serif;
    background: linear-gradient(180deg, #0c2b45 0%, #06192c 100%);
    color:var(--crema);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    overflow-x:hidden;
  }

  /* ---- Header ---- */
  header{
    padding:18px 16px 10px;
    text-align:center;
    position:relative;
    z-index:5;
  }
  header .logo-mini{
    width:54px; height:54px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid var(--dorado-claro);
    box-shadow:0 2px 10px var(--sombra);
    margin-bottom:6px;
  }
  header h1{
    font-size:1.3rem;
    letter-spacing:0.5px;
    color:var(--dorado-claro);
    font-weight:700;
  }
  header p.subtitulo{
    font-size:0.78rem;
    color:#cbb89a;
    margin-top:2px;
    font-style:italic;
  }

  /* ---- Tabs ---- */
  nav.tabs{
    display:flex;
    justify-content:center;
    gap:8px;
    padding:8px 16px 14px;
    z-index:5;
  }
  nav.tabs button{
    background:transparent;
    border:1.5px solid var(--dorado);
    color:var(--dorado-claro);
    padding:8px 18px;
    border-radius:30px;
    font-family:inherit;
    font-size:0.85rem;
    cursor:pointer;
    transition:all .25s ease;
  }
  nav.tabs button.active{
    background:var(--dorado);
    color:#06192c;
    font-weight:bold;
  }

  main{
    flex:1;
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  /* ---- Vista Aleatoria ---- */
  #vistaAleatoria{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:6px 16px 30px;
  }

  .tarjeta-wrap{
    width:100%;
    max-width:420px;
    margin-top:6px;
  }

  }
  #tarjetaFrase::before{
    content:"";
    position:absolute; inset:0;
    background: linear-gradient(180deg, rgba(6,25,44,0.15) 0%, rgba(6,25,44,0.55) 55%, rgba(6,25,44,0.92) 100%);
  }
  .tarjeta-contenido{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:22px 22px 26px;
    z-index:2;
  }
  .tarjeta-numero{
    font-size:0.7rem;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--dorado-claro);
    margin-bottom:10px;
    opacity:0.9;
  }
  .tarjeta-texto{
    font-size:1.42rem;
    line-height:1.38;
    font-weight:600;
    color:#fff;
    text-shadow:0 2px 10px rgba(0,0,0,0.6);
  }
  .tarjeta-firma{
    margin-top:14px;
    display:flex;
    align-items:center;
    gap:8px;
    font-size:0.72rem;
    color:#e9d9b8;
    opacity:0.9;
  }
  .tarjeta-firma img{
    width:20px; height:20px;
    border-radius:50%;
    object-fit:cover;
  }

  .acciones{
    width:100%;
    max-width:420px;
    display:flex;
    gap:10px;
    margin-top:18px;
  }
  .btn{
    flex:1;
    border:none;
    border-radius:14px;
    padding:14px 10px;
    font-family:inherit;
    font-size:0.92rem;
    font-weight:600;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    transition:transform .15s ease, opacity .2s ease;
  }
  .btn:active{transform:scale(0.96);}
  .btn-principal{
    background:linear-gradient(135deg, var(--dorado-claro), var(--dorado));
    color:#06192c;
  }
  .btn-secundario{
    background:rgba(244,236,221,0.08);
    border:1.5px solid var(--dorado);
    color:var(--dorado-claro);
  }
  .btn:disabled{opacity:0.6; cursor:default;}

  /* ---- Vista Lista ---- */
  #vistaLista{
    width:100%;
    max-width:560px;
    padding:4px 16px 30px;
    display:none;
  }
  .buscador{
    width:100%;
    padding:12px 16px;
    border-radius:30px;
    border:1.5px solid var(--dorado);
    background:rgba(244,236,221,0.07);
    color:var(--crema);
    font-family:inherit;
    font-size:0.92rem;
    margin-bottom:14px;
    outline:none;
  }
  .buscador::placeholder{color:#a98f6c;}

  .lista-frases{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .item-frase{
    background:rgba(244,236,221,0.05);
    border:1px solid rgba(166,119,43,0.35);
    border-radius:12px;
    padding:14px 16px;
    cursor:pointer;
    transition:background .2s ease;
    display:flex;
    gap:12px;
    align-items:flex-start;
  }
  .item-frase:active{background:rgba(166,119,43,0.18);}
  .item-frase .num{
    color:var(--dorado-claro);
    font-weight:700;
    font-size:0.82rem;
    min-width:28px;
  }
  .item-frase .txt{
    font-size:0.95rem;
    line-height:1.4;
    color:#f0e6d2;
  }
  .sin-resultados{
    text-align:center;
    color:#a98f6c;
    padding:30px 10px;
    font-style:italic;
  }

  /* ---- Toast ---- */
  #toast{
    position:fixed;
    bottom:28px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--dorado);
    color:#06192c;
    padding:12px 22px;
    border-radius:30px;
    font-size:0.88rem;
    font-weight:600;
    opacity:0;
    pointer-events:none;
    transition:all .3s ease;
    z-index:50;
    box-shadow:0 6px 20px rgba(0,0,0,0.3);
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  footer{
    text-align:center;
    padding:10px 16px 18px;
    font-size:0.7rem;
    color:#7d6750;
  }

  @media (min-width:480px){
    .tarjeta-texto{font-size:1.55rem;}
  }
</style>

    "id": 60,
    "texto": "El amor es siempre creativo."
  },
  {
    "id": 61,
    "texto": "Aprende a descubrir regalos en las pruebas."
  },
  {
    "id": 62,
    "texto": "Cada persona es un reflejo de Dios."
  },
  {
    "id": 63,
    "texto": "La fe se fortalece viviéndola."
  },
  {
    "id": 64,
    "texto": "Nunca es tarde para comenzar de nuevo."
  },
  {
    "id": 65,
    "texto": "El servicio engrandece el alma."
  },
  {
    "id": 66,
    "texto": "Confía en los planes de Dios."
  },
  {
    "id": 67,
    "texto": "Ama con generosidad."
  },
  {
    "id": 68,
    "texto": "La paz nace en el interior."
  },
  {
    "id": 69,
    "texto": "Vive cada día como un regalo."
  },
  {
    "id": 70,
    "texto": "Dios te llama por tu nombre."
  },
  {
    "id": 71,
    "texto": "La fidelidad genera frutos duraderos."
  },
  {
    "id": 72,
    "texto": "Donde hay amor, Dios está presente."
  },
  {
    "id": 73,
    "texto": "La esperanza siempre encuentra caminos."
  },
  {
    "id": 74,
    "texto": "Sé una bendición para otros."
  },
  {
    "id": 75,
    "texto": "La oración transforma el corazón."
  },
  {
    "id": 76,
    "texto": "Descubre a Dios en lo cotidiano."
  },
  {
    "id": 77,
    "texto": "La confianza abre horizontes nuevos."
  },
  {
    "id": 78,
    "texto": "Ama incluso cuando cueste."
  },
  {
    "id": 79,
    "texto": "La sencillez acerca a las personas."
  },
  {
    "id": 80,
    "texto": "Todo esfuerzo por amor vale la pena."
  },
  {
    "id": 81,
    "texto": "Vive con espíritu de alianza."
  },
  {
    "id": 82,
    "texto": "Dios camina contigo."
  },
  {
    "id": 83,
    "texto": "La gratitud es memoria del corazón."
  },
  {
    "id": 84,
    "texto": "Haz de cada dificultad una oportunidad."
  },
  {
    "id": 85,
    "texto": "El amor auténtico construye comunidad."
  },
  {
    "id": 86,
    "texto": "La Providencia nunca llega tarde."
  },
  {
    "id": 87,
    "texto": "Tu misión es irrepetible."
  },
  {
    "id": 88,
    "texto": "La fe da sentido al camino."
  },
  {
    "id": 89,
    "texto": "Sé reflejo de la bondad de Dios."
  },
  {
    "id": 90,
    "texto": "El amor siempre deja huella."
  },
  {
    "id": 91,
    "texto": "Vive con entusiasmo y esperanza."
  },
  {
    "id": 92,
    "texto": "Dios te fortalece en la debilidad."
  },
  {
    "id": 93,
    "texto": "La unidad nace del respeto mutuo."
  },
  {
    "id": 94,
    "texto": "Cada día puede acercarte a la santidad."
  },
  {
    "id": 95,
    "texto": "La confianza es el lenguaje del amor."
  },
  {
    "id": 96,
    "texto": "Sé generoso con tu tiempo y tu corazón."
  },
  {
    "id": 97,
    "texto": "Dios convierte lo pequeño en grande."
  },
  {
    "id": 98,
    "texto": "Vive para servir y servirás para vivir."
  },
  {
    "id": 99,
    "texto": "Que María te conduzca siempre a Cristo."
  },
  {
    "id": 100,
    "texto": "Nada es imposible para quien confía en Dios."
  }

let frasesActual = null;

function elegirAleatoria(excluirId){
  let candidatas = FRASES;
  if(excluirId !== undefined && FRASES.length > 1){
    candidatas = FRASES.filter(f => f.id !== excluirId);
  }
  const f = candidatas[Math.floor(Math.random()*candidatas.length)];
  mostrarFrase(f);
}

function mostrarFrase(f){
  frasesActual = f;
  document.getElementById('numFrase').textContent = 'Frase Nº ' + f.id;
  document.getElementById('textoFrase').textContent = f.texto;
}

function mostrarToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

async function compartir(){
  if(!frasesActual) return;
  const texto = `📞 El Teléfono del Padre\n\n"${frasesActual.texto}"\n\n— Frase Nº ${frasesActual.id}\nBajo tu Mirada · Alegres Servidores`;
  try{
    if(window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Share){
      await window.Capacitor.Plugins.Share.share({ title:'El Teléfono del Padre', text: texto });
      return;
    }
    if(navigator.share){
      await navigator.share({ title:'El Teléfono del Padre', text: texto });
      return;
    }
    await navigator.clipboard.writeText(texto);
    mostrarToast('Texto copiado al portapapeles');
  }catch(e){
    // usuario canceló el share o no hay soporte; intentar copiar como respaldo
    try{
      await navigator.clipboard.writeText(texto);
      mostrarToast('Texto copiado al portapapeles');
    }catch(e2){}
  }
}

function renderLista(filtro=''){
  const cont = document.getElementById('listaFrases');
  const f = filtro.trim().toLowerCase();
  const filtradas = FRASES.filter(item =>
    item.texto.toLowerCase().includes(f) || String(item.id).includes(f)
  );
  if(filtradas.length === 0){
    cont.innerHTML = '<div class="sin-resultados">No se encontraron frases.</div>';
    return;
  }
  cont.innerHTML = filtradas.map(item => `
    <div class="item-frase" data-id="${item.id}">
      <span class="num">${item.id}.</span>
      <span class="txt">${item.texto}</span>
    </div>
  `).join('');

  cont.querySelectorAll('.item-frase').forEach(el=>{
    el.addEventListener('click', ()=>{
      const id = parseInt(el.dataset.id);
      const frase = FRASES.find(x=>x.id===id);
      mostrarFrase(frase);
      cambiarTab('aleatoria');
      window.scrollTo({top:0, behavior:'smooth'});
    });
  });
}

function cambiarTab(tab){
  const vA = document.getElementById('vistaAleatoria');
  const vL = document.getElementById('vistaLista');
  const tA = document.getElementById('tabAleatoria');
  const tL = document.getElementById('tabLista');
  if(tab==='aleatoria'){
    vA.style.display='flex';
    vL.style.display='none';
    tA.classList.add('active');
    tL.classList.remove('active');
  }else{
    vA.style.display='none';
    vL.style.display='block';
    tL.classList.add('active');
    tA.classList.remove('active');
  }
}

document.getElementById('tabAleatoria').addEventListener('click', ()=>cambiarTab('aleatoria'));
document.getElementById('tabLista').addEventListener('click', ()=>{
  cambiarTab('lista');
  renderLista(document.getElementById('buscador').value);
});
document.getElementById('btnOtra').addEventListener('click', ()=>{
  elegirAleatoria(frasesActual ? frasesActual.id : undefined);
});
document.getElementById('btnCompartir').addEventListener('click', compartir);
document.getElementById('buscador').addEventListener('input', (e)=>renderLista(e.target.value));

// Init
elegirAleatoria();
renderLista();
</script>
</body>
</html>
